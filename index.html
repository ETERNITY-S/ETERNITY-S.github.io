<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightBringer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">

        <img src="assets/logo.png" alt="LightBringer">

        <h1>LightBringer</h1>

    </div>

    <!-- Login Screen -->
    <div id="login-container">

        <div class="login-box">

            <img src="assets/logo.png" alt="LightBringer">

            <h2>LightBringer</h2>

            <input
                type="email"
                placeholder="Email"
            >

            <input
                type="password"
                placeholder="Password"
            >

            <button>
                Login
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
<p style="margin-top:15px;">
    Don't have an account?
    <a href="signup.html">Sign Up</a>
</p>
