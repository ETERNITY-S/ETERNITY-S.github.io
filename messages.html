    <div class="chat-list">

        <h3>Chats</h3>

        <div id="friendsList"></div>

        <h3 id="chatTitle">

        <div id="messagesContainer"></div>

                type="text"
                placeholder="Type a message..."

                Send
            </button>

        </div>

    </div>
