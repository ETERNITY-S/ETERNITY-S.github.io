<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - LightBringer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="feed-nav">
    <div class="brand">LightBringer</div>

    <div class="nav-links">
        <a href="feed.html">Home</a>
        <a href="friends.html">Friends</a>
        <a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
        <a href="notifications.html">Notifications</a>
        <a href="search.html">Search</a>
        <a href="friend-requests.html">Requests</a>
        <a href="settings.html">Settings</a>
    </div>
</nav>

<div class="messages-layout">

    <div class="chat-list">

        <h3>Chats</h3>

        <div class="chat-user">Alex</div>
        <div class="chat-user">Emma</div>
        <div class="chat-user">Sam</div>

    </div>

    <div class="chat-window">

        <h3>Alex</h3>

        <div class="message received">
            Hello!
        </div>

        <div class="message sent">
            Hi Alex 👋
        </div>

        <div class="message-input">

            <input
                type="text"
                placeholder="Type a message..."
            >

            <button>Send</button>

        </div>

    </div>

</div>

</body>
</html>
