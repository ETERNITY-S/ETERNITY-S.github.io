<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - LightBringer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="feed-nav">
    <div class="brand">LightBringer</div>

    <div class="nav-links">
        <a href="feed.html">Home</a>
        <a href="friends.html">Friends</a>
        <a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
        <a href="notifications.html">Notifications</a>
        <a href="search.html">Search</a>
        <a href="friend-requests.html">Requests</a>
        <a href="settings.html">Settings</a>
    </div>
</nav>

<div class="settings-container">

    <h2>Account Settings</h2>

    <div class="settings-card">

        <h3>Username</h3>

        <input type="text" value="Shourya">

        <p>
            Username can be changed once every 7 days.
        </p>

    </div>

    <div class="settings-card">

        <h3>Bio</h3>

        <textarea maxlength="100"
        placeholder="Maximum 100 characters"></textarea>

    </div>

    <div class="settings-card">

        <h3>Privacy</h3>

        <label>
            <input type="checkbox" checked>
            Friends Only Posts
        </label>

    </div>

    <div class="settings-card">

        <h3>Invites</h3>

        <p>
            Invite system coming soon.
        </p>

    </div>
    
<div class="settings-card">

    <h3>Account</h3>

    <button id="logoutBtn">
        Logout
    </button>

</div>
</div>
<script type="module" src="settings.js"></script>
</body>
</html>
