<div class="settings-container">

    <h2>Account Settings</h2>

    <div class="settings-card">

        <h3>Username</h3>

        <input
            id="usernameInput"
            type="text">

    </div>

    <div class="settings-card">

        <h3>Bio</h3>

        <textarea
            id="bioInput"
            maxlength="100"
            placeholder="Maximum 100 characters">
        </textarea>

        <br><br>

        <button id="saveProfileBtn">
            Save Profile
        </button>

    </div>

    <div class="settings-card">

        <button id="logoutBtn">
            Logout
        </button>

    </div>

</div>
