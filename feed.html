<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightBringer Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="feed-nav">
    <div class="brand">
        LightBringer
    </div>

    <div class="nav-links">
        <a href="friends.html">Friends</a>
<a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
        <a href="notifications.html">Notifications</a>
        <a href="search.html">Search</a>
        <a href="friend-requests.html">Requests</a>
        <a href="settings.html">Settings</a>
    </div>
</nav>

<div class="feed-container">

   <div class="stories">

    <div class="story">
        <div class="story-circle">+</div>
        <span>Your Story</span>
    </div>

    <div class="story">
        <div class="story-circle">A</div>
        <span>Alex</span>
    </div>

    <div class="story">
        <div class="story-circle">S</div>
        <span>Sam</span>
    </div>

    <div class="story">
        <div class="story-circle">E</div>
        <span>Emma</span>
    </div>

</div>

   <div class="create-post">

    <h3>Create Post</h3>

    <textarea
        id="postText"
        placeholder="Share something with your friends..."
    ></textarea>

    <button id="postBtn">
        Post
    </button>

</div>

<div id="postsContainer"></div>

</div>
<script type="module" src="feed.js"></script>
</body>
</html>
